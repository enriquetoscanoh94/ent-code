    <script>
      // SPA redirect handler: recibe /?p=/contact y lo convierte de vuelta a /contact
      (function () {
        var qs = window.location.search;
        if (qs && qs.indexOf("p=") !== -1) {
          var params = new URLSearchParams(qs);
          var redirectPath = params.get("p");
          var redirectQuery = params.get("q") ? "?" + params.get("q") : "";
          if (redirectPath) {
            window.history.replaceState(null, "", redirectPath + redirectQuery + window.location.hash);
          }
        }
      })();
    </script>
